<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Incidencias RRHH</title>
</head>
<body>
  <h1>Incidencias RRHH</h1>
  <button onclick="cargarIncidencias()">Ver incidencias</button>
  <ul id="lista"></ul>

  <script>
    async function cargarIncidencias() {
      try {
        console.log('Cargando incidencias...');
        const res = await fetch('http://localhost:3000/api/incidencias');
        console.log('Respuesta recibida:', res.status);
        
        if (!res.ok) {
          throw new Error(`HTTP error! status: ${res.status}`);
        }
        
        const data = await res.json();
        console.log('Datos recibidos:', data);

        const lista = document.getElementById('lista');
        lista.innerHTML = '';

        if (data.length === 0) {
          lista.innerHTML = '<li>No hay incidencias registradas</li>';
          return;
        }

        data.forEach(item => {
          const li = document.createElement('li');
          li.textContent = `${item.id_incidencia} - ${item.first_name} ${item.last_name} - ${item.tipo} - ${item.descripcion} - ${item.estatus}`;
          lista.appendChild(li);
        });
        
        console.log('Incidencias cargadas correctamente');
      } catch (error) {
        console.error('Error al cargar incidencias:', error);
        const lista = document.getElementById('lista');
        lista.innerHTML = `<li style="color: red;">Error: ${error.message}</li>`;
      }
    }
  </script>
</body>
</html>
