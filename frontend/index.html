<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard RRHH</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="header">
    <h1>Sistema de Gestión de Recursos Humanos</h1>
    <div class="widget-clima">
      <div id="fechaActual"></div>
      <div id="climaActual"></div>
    </div>
  </header>

  <nav class="menu">
    <a href="index.html">Inicio</a>
    <a href="empleados.html">Empleados</a>
    <a href="departamentos.html">Departamentos</a>
    <a href="incidencias.html">Incidencias</a>
  </nav>

  <main class="contenedor">

    <div class="cards-resumen">
      <div class="card">
        <h2>Total empleados</h2>
        <p class="stat-number" id="totalEmployees">—</p>
        <small>Registrados en el sistema</small>
      </div>
      <div class="card">
        <h2>Departamentos</h2>
        <p class="stat-number" id="totalDepartamentos">—</p>
        <small>Áreas activas</small>
      </div>
      <div class="card">
        <h2>Incidencias</h2>
        <p class="stat-number" id="totalIncidencias">—</p>
        <small>Total registradas</small>
      </div>
    </div>

    <div class="grid-dashboard">
      <section class="tabla-seccion">
        <h2>Empleados por departamento</h2>
        <div class="chart-container">
          <canvas id="chartDepartamentos"></canvas>
        </div>
      </section>

      <section class="tabla-seccion">
        <h2>Incidencias recientes</h2>
        <ul class="lista-incidencias" id="listaIncidencias"></ul>
      </section>
    </div>

  </main>

  <script src="js/main.js"></script>
</body>
</html>
